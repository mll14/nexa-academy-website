services:
  web:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - chroma_db:/app/chroma_db
    networks:
      - coolify

  cron:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - chroma_db:/app/chroma_db
    # web service owns migrations — cron just runs the periodic task
    entrypoint: >
      sh -c "while true; do
               python manage.py send_application_reminders;
               sleep 3600;
             done"
    depends_on:
      - web
    networks:
      - coolify

volumes:
  static_volume:
  media_volume:
  chroma_db:

networks:
  coolify:
    external: true
