<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{% block subject %}Nexa Academy{% endblock %}</title>
  <style>
    body{margin:0;padding:0;background:#f7f9fc;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
    .wrap{width:100%;padding:32px 0;}
    .card{width:600px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;}
    .hdr{background:#141a42;padding:22px 40px;text-align:center;}
    .body{padding:40px;color:#1a202c;}
    .ftr{background:#f7f9fc;padding:20px 40px;text-align:center;border-top:1px solid #e2e8f0;}
    @media only screen and (max-width:620px){
      .card{width:100%!important;border-radius:0!important;}
      .body{padding:24px!important;}
    }
  </style>
</head>
<body>
<table class="wrap" cellpadding="0" cellspacing="0" width="100%">
<tr><td align="center">
  <table class="card" cellpadding="0" cellspacing="0" width="600">
    <tr>
      <td class="hdr">
        <img src="{{ frontend_url }}/nexa-academy-small-logo.png"
             alt="Nexa Academy" width="37" height="40"
             style="display:inline-block;vertical-align:middle;margin-right:10px;border-radius:8px;"/>
        <span style="font-size:18px;font-weight:800;color:#fff;vertical-align:middle;letter-spacing:-0.3px;">Nexa Academy</span>
        <div style="font-size:11px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:1px;margin-top:4px;">Admissions</div>
      </td>
    </tr>
    <tr>
      <td class="body" style="padding:40px;color:#1a202c;">{% block content %}{% endblock %}</td>
    </tr>
    <tr>
      <td class="ftr">
        <p style="margin:0 0 6px;font-size:13px;color:#718096;">Nexa Academy &middot; 10th Floor, JKUAT Towers, CBD Nairobi</p>
        <p style="margin:0;font-size:12px;color:#a0aec0;">info@nexaacademy.co.ke &middot; +254713067311</p>
        <p style="margin:8px 0 0;font-size:11px;color:#cbd5e0;">&copy; {% now "Y" %} Nexa Academy. All rights reserved.</p>
      </td>
    </tr>
  </table>
</td></tr>
</table>
</body>
</html>
