{% extends "emails/base_email.html" %}
{% block subject %}{{ subject }}{% endblock %}

{% block content %}
<div style="font-size:15px;color:#1a202c;line-height:1.7;">
  {{ html_body|safe }}
</div>

<div style="margin:28px 0 0;padding:18px 20px;background:#f7f9fc;border:1px solid #e2e8f0;border-radius:10px;">
  <p style="margin:0;font-size:13px;color:#718096;line-height:1.7;">
    You're receiving this because you subscribed to Nexa Academy updates.
  </p>
</div>
{% endblock %}

{% block footer_extra %}
<p style="margin:10px 0 0;font-size:12px;">
  <a href="{{ unsubscribe_url }}" style="color:#a0aec0;text-decoration:underline;">Unsubscribe</a>
  &nbsp;&middot;&nbsp;
  <a href="{{ frontend_url }}" style="color:#a0aec0;text-decoration:underline;">Visit Website</a>
</p>
{% endblock %}
